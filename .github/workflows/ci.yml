name: Node.js CI

on:
  push:
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: |
          npm run lint --if-present

      - name: Build
        run: npm run build --if-present
